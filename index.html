<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0B0D10">
<title>Squash Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0D10;
  --surface: #14171C;
  --surface-2: #1B1F26;
  --line: #262B33;
  --line-soft: #1F2329;
  --text: #F2F3F5;
  --text-dim: #8A8F99;
  --text-mute: #555A65;
  --accent: #C6FF3D;
  --accent-ink: #0B0D10;
  --win: #7FE7B0;
  --loss: #FF6B6B;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  background: var(--bg);
}

body {
  color: var(--text);
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  padding: 16px 16px max(20px, env(safe-area-inset-bottom)) 16px;
}

button, input {
  font: inherit;
  color: inherit;
}

button { -webkit-tap-highlight-color: transparent; }

input:focus { outline: none; }

.app {
  max-width: 480px;
  margin: 0 auto;
  display: grid;
  gap: 22px;
}

.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
.tnum { font-feature-settings: "tnum"; }

/* ============ HEADER ============ */
.top {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 2px 14px 2px;
  border-bottom: 1px solid var(--line-soft);
}
.brand {
  font-family: 'Geist', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.brand-sub {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--text-mute);
  font-weight: 500;
}
.progress {
  margin-left: auto;
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-weight: 500;
}
.reset-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 15px;
  font-family: 'JetBrains Mono', monospace;
  display: grid;
  place-items: center;
  transition: background 150ms ease, color 150ms ease, transform 80ms ease;
}
.reset-btn:hover { background: var(--surface-2); color: var(--text); }
.reset-btn:active { transform: scale(0.94); }

.nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  display: grid;
  place-items: center;
  transition: background 150ms ease, color 150ms ease, transform 80ms ease;
}
.nav-btn:hover { background: var(--surface-2); color: var(--text); }
.nav-btn:active { transform: scale(0.94); }

/* ============ LABELS / EYEBROW ============ */
.label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
}
section {
  display: grid;
  gap: 14px;
}
.eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
}
.eyebrow .hr {
  flex: 1;
  height: 1px;
  background: var(--line-soft);
}
.eyebrow .meta {
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.1em;
  font-weight: 500;
}

/* ============ AVATAR ============ */
.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--line);
  display: grid;
  place-items: center;
  overflow: hidden;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: border-color 150ms ease, background 150ms ease;
}
.avatar:hover { border-color: var(--text-mute); }
.avatar:active { transform: scale(0.96); transition: transform 80ms ease; }
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.avatar .initials {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.avatar .plus {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: var(--text-mute);
  font-weight: 500;
}
.avatar.lg {
  width: 56px;
  height: 56px;
}
.avatar.lg .initials { font-size: 16px; }
.avatar.xl {
  width: 72px;
  height: 72px;
}
.avatar.xl .initials { font-size: 20px; }
.avatar input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  font-size: 0;
}

/* ============ SETUP: PLAYERS ============ */
.players-list {
  display: grid;
  gap: 8px;
}
.player-row {
  display: grid;
  grid-template-columns: auto auto 1fr auto;
  gap: 10px;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 6px 10px 6px 10px;
  transition: border-color 150ms ease;
}
.player-row:focus-within {
  border-color: var(--text-mute);
}
.tag {
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.1em;
  font-weight: 500;
  min-width: 22px;
}
.player-row input {
  background: transparent;
  border: none;
  height: 52px;
  font-size: 15px;
  color: var(--text);
  width: 100%;
  font-family: 'Geist', sans-serif;
}
.player-row input::placeholder { color: var(--text-mute); }
.remove {
  width: 36px;
  height: 36px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-mute);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  border-radius: 9px;
  display: grid;
  place-items: center;
  transition: color 150ms ease, background 150ms ease;
}
.remove:hover {
  color: var(--loss);
  background: rgba(255, 107, 107, 0.08);
}
.add-player {
  height: 52px;
  border: 1px dashed var(--line);
  background: transparent;
  color: var(--text-dim);
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  font-weight: 500;
  transition: border-color 150ms ease, color 150ms ease, background 150ms ease;
}
.add-player:hover {
  border-color: var(--text-mute);
  color: var(--text);
  background: rgba(255, 255, 255, 0.02);
}

/* ============ SEGMENTED CONTROL ============ */
.segmented {
  display: grid;
  grid-auto-columns: 1fr;
  grid-auto-flow: column;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 4px;
  gap: 2px;
}
.seg {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 56px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 9px;
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  font-weight: 500;
  transition: background 150ms ease, color 150ms ease;
}
.seg:hover:not(.active) { color: var(--text); }
.seg.active {
  background: var(--surface-2);
  color: var(--text);
  box-shadow: 0 0 0 1px var(--line);
}
.seg-meta {
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.12em;
}
.seg.active .seg-meta { color: var(--text-dim); }

/* ============ PRIMARY BUTTON ============ */
.primary {
  height: 64px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: var(--accent-ink);
  font-family: 'Geist', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 80ms ease, background 150ms ease, opacity 150ms ease, color 150ms ease;
  width: 100%;
  letter-spacing: 0.01em;
}
.primary:disabled {
  background: var(--surface-2);
  color: var(--text-mute);
  cursor: not-allowed;
}
.primary:hover:not(:disabled) { opacity: 0.92; }
.primary:active:not(:disabled) { transform: scale(0.985); }
.primary.flash-error {
  animation: flashErr 0.5s cubic-bezier(.36,.07,.19,.97);
}
@keyframes flashErr {
  0%, 100% { background: var(--accent); color: var(--accent-ink); transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { background: var(--loss); color: #fff; transform: translateX(-4px); }
  20%, 40%, 60%, 80% { background: var(--loss); color: #fff; transform: translateX(4px); }
}

/* ============ NOW PLAYING ============ */
.now-playing {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-top: 2px solid var(--accent);
  border-radius: 14px;
  padding: 20px 18px 20px;
  display: grid;
  gap: 24px;
  overflow: hidden;
}
.now-playing::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 140px;
  background: linear-gradient(180deg, rgba(198, 255, 61, 0.06), transparent 75%);
  pointer-events: none;
}
.np-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}
.np-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
}
.np-label .dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.6s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(198, 255, 61, 0.5);
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.35; transform: scale(0.8); }
}
.np-game {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--text-dim);
}

.players-grid {
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  gap: 14px;
  position: relative;
  z-index: 1;
}
.divider {
  background: var(--line-soft);
  width: 1px;
  align-self: stretch;
}
.player-col {
  display: grid;
  gap: 14px;
  text-align: center;
  min-width: 0;
}
.pname {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.005em;
}
.pscore {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 68px;
  font-feature-settings: "tnum";
  line-height: 1;
  color: var(--text);
  letter-spacing: -0.03em;
}
.score-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.score-btn {
  height: 56px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--surface-2);
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  transition: transform 80ms ease, background 150ms ease, border-color 150ms ease;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  display: grid;
  place-items: center;
}
.score-btn:hover:not(:disabled) {
  background: var(--line);
  border-color: var(--text-mute);
}
.score-btn:active:not(:disabled) { transform: scale(0.94); }
.score-btn:disabled { opacity: 0.28; cursor: not-allowed; }

/* ============ UP NEXT ============ */
.up-next {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--line-soft);
  border-radius: 12px;
}
.un-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-mute);
  text-transform: uppercase;
  font-weight: 500;
}
.un-names {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
  flex: 1;
}
.un-names .vs {
  color: var(--text-mute);
  margin: 0 5px;
  font-size: 11px;
}
.un-game {
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--text-mute);
  font-weight: 500;
}

/* ============ STANDINGS ============ */
.standings {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.standings thead th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--text-mute);
  text-transform: uppercase;
  font-weight: 500;
  text-align: right;
  padding: 4px 6px 12px;
  border-bottom: 1px solid var(--line-soft);
}
.standings thead th:nth-child(1),
.standings thead th:nth-child(2) {
  text-align: left;
}
.standings tbody td {
  padding: 13px 6px;
  border-bottom: 1px solid var(--line-soft);
  text-align: right;
  vertical-align: middle;
}
.standings tbody tr:last-child td { border-bottom: none; }
.standings tbody td:nth-child(1) {
  text-align: left;
  color: var(--text-mute);
  width: 22px;
  font-size: 12px;
}
.standings tbody td:nth-child(2) { text-align: left; }
.name-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
  color: var(--text);
}
.ldot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px rgba(198, 255, 61, 0.5);
  flex-shrink: 0;
}
.standings .pts {
  font-weight: 700;
  font-size: 17px;
  font-feature-settings: "tnum";
  color: var(--text);
}
.standings .pts-leader { color: var(--accent); }
.standings .diff {
  font-size: 13px;
  color: var(--text-dim);
  font-feature-settings: "tnum";
}
.standings .diff.win { color: var(--win); }
.standings .diff.loss { color: var(--loss); }
.standings .wl {
  font-size: 13px;
  color: var(--text-dim);
  font-feature-settings: "tnum";
}

/* ============ COMPLETED ============ */
.completed {
  list-style: none;
  display: grid;
  gap: 0;
}
.completed-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  padding: 11px 6px;
  align-items: center;
  font-size: 13px;
  border-bottom: 1px solid var(--line-soft);
}
.completed-row:last-child { border-bottom: none; }
.completed-row .g {
  color: var(--text-mute);
  font-size: 10px;
  letter-spacing: 0.14em;
  font-weight: 500;
}
.completed-row .names {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.completed-row .names .winner { color: var(--text); font-weight: 600; }
.completed-row .names .loser { color: var(--text-mute); font-weight: 400; }
.completed-row .names .vs {
  color: var(--text-mute);
  margin: 0 6px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
}
.completed-row .cs {
  font-feature-settings: "tnum";
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
}

/* ============ TOURNAMENT COMPLETE ============ */
.complete-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-top: 2px solid var(--accent);
  border-radius: 14px;
  padding: 32px 20px 28px;
  overflow: hidden;
  display: grid;
  gap: 14px;
  text-align: center;
}
.complete-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 160px;
  background: linear-gradient(180deg, rgba(198, 255, 61, 0.08), transparent 75%);
  pointer-events: none;
}
.complete-top {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  z-index: 1;
}
.complete-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--accent);
  font-weight: 500;
  text-transform: uppercase;
}
.star {
  color: var(--accent);
  font-size: 13px;
  line-height: 1;
}
.winner-name {
  font-family: 'Geist', sans-serif;
  font-size: 40px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
  line-height: 1.05;
  position: relative;
  z-index: 1;
  word-break: break-word;
}
.winner-tied-names {
  font-family: 'Geist', sans-serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1.25;
  position: relative;
  z-index: 1;
  letter-spacing: -0.005em;
  word-break: break-word;
}
.winner-stats {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  position: relative;
  z-index: 1;
  font-weight: 500;
}

/* ============ MODAL ============ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 100;
  animation: fade 150ms ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 22px;
  max-width: 380px;
  width: 100%;
  display: grid;
  gap: 16px;
  animation: rise 180ms cubic-bezier(.16,1,.3,1);
}
@keyframes rise {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.modal-body {
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.5;
}
.modal-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.modal-btn {
  height: 52px;
  border-radius: 12px;
  font-family: 'Geist', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--line);
  background: var(--surface-2);
  color: var(--text);
  transition: background 150ms ease, transform 80ms ease;
}
.modal-btn:hover { background: var(--line); }
.modal-btn:active { transform: scale(0.97); }
.modal-btn.destructive {
  background: var(--loss);
  border-color: var(--loss);
  color: #fff;
  font-weight: 600;
}
.modal-btn.destructive:hover { background: #ff5555; border-color: #ff5555; }

/* ============ HISTORY ============ */
.history-list {
  display: grid;
  gap: 10px;
}
.history-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 14px 14px 16px;
  display: grid;
  gap: 8px;
}
.history-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.history-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--text-mute);
  text-transform: uppercase;
}
.history-delete {
  width: 28px;
  height: 28px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-mute);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  border-radius: 7px;
  display: grid;
  place-items: center;
  transition: color 150ms ease, background 150ms ease;
}
.history-delete:hover {
  color: var(--loss);
  background: rgba(255, 107, 107, 0.08);
}
.history-winner {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.005em;
  flex-wrap: wrap;
}
.history-winner .star {
  color: var(--accent);
  font-size: 12px;
  flex-shrink: 0;
}
.history-winner.tied {
  font-size: 15px;
}
.history-winner.tied .tied-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 500;
  margin-right: 2px;
}
.history-stats {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;

<body>
<div id="app" class="app"></div>
<div id="modal-root"></div>
<script>
'use strict';

// ============================================================
// STATE
// ============================================================
const STATE_KEY = 'squash-tracker-v1';
const DEFAULT_STATE = () => ({
  phase: 'home',
  players: ['', '', '', ''],
  rounds: 1,
  currentGame: 0,
  currentScores: [0, 0],
  results: [],
  archived: false,
  history: [],
  people: [],
});

function validateState(s) {
  if (!s || !['home', 'setup', 'tournament', 'people'].includes(s.phase)) return DEFAULT_STATE();
  return {
    phase: s.phase,
    players: Array.isArray(s.players) && s.players.length >= 3 && s.players.length <= 8
      ? s.players.map(String)
      : DEFAULT_STATE().players,
    rounds: (typeof s.rounds === 'number' && s.rounds >= 1 && s.rounds <= 10) ? Math.floor(s.rounds) : 1,
    currentGame: typeof s.currentGame === 'number' && s.currentGame >= 0 ? s.currentGame : 0,
    currentScores: Array.isArray(s.currentScores) && s.currentScores.length === 2
      ? [Math.max(0, +s.currentScores[0] || 0), Math.max(0, +s.currentScores[1] || 0)]
      : [0, 0],
    results: Array.isArray(s.results) ? s.results : [],
    archived: !!s.archived,
    history: Array.isArray(s.history) ? s.history : [],
    people: Array.isArray(s.people) ? s.people.filter(p => p && typeof p.name === 'string') : [],
  };
}

function loadLocalState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return DEFAULT_STATE();
    return validateState(JSON.parse(raw));
  } catch (e) {
    return DEFAULT_STATE();
  }
}

function stateHasContent(s) {
  if (!s) return false;
  return (Array.isArray(s.history) && s.history.length > 0)
    || (Array.isArray(s.results) && s.results.length > 0);
}

let state = loadLocalState();

// --- Server sync ---
const SAVE_DEBOUNCE_MS = 400;
let _saveTimer = null;
let _dirty = false;
let _serverAvailable = true;

function persist() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (e) {}
  _dirty = true;
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_syncToServer, SAVE_DEBOUNCE_MS);
}

async function _syncToServer() {
  _saveTimer = null;
  if (!_serverAvailable) return;
  try {
    const res = await fetch('/api/state', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    });
    if (res.status === 503) { _serverAvailable = false; return; }
    if (res.ok) _dirty = false;
  } catch (e) {
    // offline — localStorage already has it; will retry on next persist
  }
}

async function _fetchFromServer() {
  try {
    const res = await fetch('/api/state', { cache: 'no-store' });
    if (res.status === 503) { _serverAvailable = false; return undefined; }
    if (!res.ok) return undefined;
    return await res.json();
  } catch (e) {
    return undefined;
  }
}

async function _hydrateFromServer() {
  const remote = await _fetchFromServer();
  if (remote === undefined) return; // server unavailable; keep local
  if (remote && stateHasContent(remote)) {
    state = validateState(remote);
    try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (e) {}
    render();
  } else if (stateHasContent(state)) {
    // server is empty (first run after enabling MongoDB) — push local up
    _dirty = true;
    _syncToServer();
  }
}

async function _refreshOnFocus() {
  if (_dirty || _saveTimer) return; // we have unsynced local edits; don't clobber
  const remote = await _fetchFromServer();
  if (remote === undefined || remote === null) return;
  const next = validateState(remote);
  // Cheap shallow check to avoid pointless re-renders.
  if (JSON.stringify(next) === JSON.stringify(state)) return;
  state = next;
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (e) {}
  render();
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') _refreshOnFocus();
});
window.addEventListener('focus', _refreshOnFocus);
window.addEventListener('online', () => { _serverAvailable = true; if (_dirty) _syncToServer(); });

// ============================================================
// UTILS
// ============================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function pad2(n) { return String(n).padStart(2, '0'); }

// ============================================================
// PEOPLE / PHOTOS
// ============================================================
const AVATAR_SIZE = 256;
const AVATAR_QUALITY = 0.82;

function normalizeName(name) {
  return String(name || '').trim().toLowerCase();
}
function getInitials(name) {
  const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function findPersonByName(name) {
  const key = normalizeName(name);
  if (!key) return null;
  return (state.people || []).find(p => normalizeName(p.name) === key) || null;
}
function findPersonById(id) {
  return (state.people || []).find(p => p.id === id) || null;
}
function upsertPerson(name, photo) {
  const trimmed = String(name || '').trim();
  if (!trimmed) return null;
  state.people = state.people || [];
  const existing = findPersonByName(trimmed);
  if (existing) {
    if (photo !== undefined && photo !== null) existing.photo = photo;
    existing.name = trimmed;
    return existing;
  }
  const p = {
    id: Date.now() + Math.floor(Math.random() * 1000),
    name: trimmed,
    photo: photo || null,
    createdAt: Date.now(),
  };
  state.people.push(p);
  return p;
}
function deletePersonById(id) {
  state.people = (state.people || []).filter(p => p.id !== id);
}
function countAppearances(personName) {
  const key = normalizeName(personName);
  let n = 0;
  for (const h of (state.history || [])) {
    if ((h.players || []).some(pn => normalizeName(pn) === key)) n++;
  }
  return n;
}

function processImageFile(file) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type || !file.type.startsWith('image/')) {
      reject(new Error('Not an image'));
      return;
    }
    const reader = new FileReader();
    reader.onerror = () => reject(reader.error);
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Image decode failed'));
      img.onload = () => {
        const size = AVATAR_SIZE;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const srcSize = Math.min(img.width, img.height);
        const sx = (img.width - srcSize) / 2;
        const sy = (img.height - srcSize) / 2;
        ctx.fillStyle = '#1B1F26';
        ctx.fillRect(0, 0, size, size);
        ctx.drawImage(img, sx, sy, srcSize, srcSize, 0, 0, size, size);
        try {
          resolve(canvas.toDataURL('image/jpeg', AVATAR_QUALITY));
        } catch (e) {
          reject(e);
        }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderAvatar(name, photo, size) {
  const cls = size === 'lg' ? ' lg' : size === 'xl' ? ' xl' : '';
  if (photo) {
    return `<div class="avatar${cls}"><img src="${photo}" alt="" /></div>`;
  }
  return `<div class="avatar${cls}"><span class="initials">${escapeHtml(getInitials(name) || '+')}</span></div>`;
}

function updateRowAvatar(idx, name) {
  const avatar = document.querySelector(`label.avatar[data-avatar-idx="${idx}"]`);
  if (!avatar) return;
  const fileInput = avatar.querySelector('input[type="file"]');
  const person = findPersonByName(name);
  const photo = person ? person.photo : null;
  avatar.innerHTML = '';
  if (photo) {
    const img = document.createElement('img');
    img.src = photo;
    avatar.appendChild(img);
  } else {
    const span = document.createElement('span');
    if (name && name.trim()) {
      span.className = 'initials';
      span.textContent = getInitials(name);
    } else {
      span.className = 'plus';
      span.textContent = '+';
    }
    avatar.appendChild(span);
  }
  if (fileInput) avatar.appendChild(fileInput);
}

// ============================================================
// SCHEDULE — greedy: minimize overlap with previous game,
// tie-break by total games played so far for the pair.
// For n=4 this produces: [0,1],[2,3],[0,2],[1,3],[0,3],[1,2]
// ============================================================
function allPairs(n) {
  const r = [];
  for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) r.push([i, j]);
  return r;
}

function singleRoundRobin(n) {
  const all = allPairs(n);
  if (all.length === 0) return [];
  const used = new Set();
  const games = new Array(n).fill(0);
  const key = p => p[0] + '-' + p[1];

  let current = [0, 1];
  const out = [current];
  used.add(key(current));
  games[0]++; games[1]++;

  while (used.size < all.length) {
    const remaining = all.filter(p => !used.has(key(p)));
    // Stable sort: equal items preserve insertion order from allPairs().
    remaining.sort((a, b) => {
      const ov = q =>
        (q[0] === current[0] || q[0] === current[1] ? 1 : 0) +
        (q[1] === current[0] || q[1] === current[1] ? 1 : 0);
      const oa = ov(a), ob = ov(b);
      if (oa !== ob) return oa - ob;
      const ga = games[a[0]] + games[a[1]];
      const gb = games[b[0]] + games[b[1]];
      return ga - gb;
    });
    current = remaining[0];
    out.push(current);
    used.add(key(current));
    games[current[0]]++; games[current[1]]++;
  }
  return out;
}

function generateSchedule(n, rounds) {
  const single = singleRoundRobin(n);
  const r = Math.max(1, Math.floor(rounds || 1));
  if (r === 1) return single;
  const out = [];
  for (let i = 0; i < r; i++) out.push(...single.map(p => p.slice()));
  return out;
}

function longRoundsFor(n) {
  if (n <= 1) return 1;
  return Math.max(1, Math.ceil(10 / (n - 1)));
}

function roundsLabel(rounds) {
  const labels = { 1: 'Single', 2: 'Double', 3: 'Triple', 4: 'Quadruple', 5: 'Quintuple' };
  return labels[rounds] || (rounds + '×');
}

// ============================================================
// STANDINGS
// ============================================================
function computeStandings(players, results) {
  const stats = players.map((name, i) => ({
    index: i, name, points: 0, diff: 0, wins: 0, losses: 0,
  }));
  for (const r of results) {
    const a = stats[r.p1], b = stats[r.p2];
    a.points += r.s1;
    b.points += r.s2;
    a.diff += r.s1 - r.s2;
    b.diff += r.s2 - r.s1;
    if (r.s1 > r.s2) { a.wins++; b.losses++; }
    else if (r.s2 > r.s1) { b.wins++; a.losses++; }
  }
  return [...stats].sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    if (b.diff !== a.diff) return b.diff - a.diff;
    if (b.wins !== a.wins) return b.wins - a.wins;
    return a.index - b.index;
  });
}

const $app = () => document.getElementById('app');

function render() {
  if (state.phase === 'home') renderHome();
  else if (state.phase === 'setup') renderSetup();
  else if (state.phase === 'people') renderPeople();
  else renderTournament();
}

// ----- People page state (ephemeral; not persisted) -----
let peopleSelection = new Set();
const PEOPLE_MIN = 3;
const PEOPLE_MAX = 8;

function goToPeople() {
  peopleSelection = new Set();
  state.phase = 'people';
  persist();
  render();
}

function renderPeople() {
  const people = (state.people || []).slice().sort((a, b) => {
    const ca = countAppearances(a.name);
    const cb = countAppearances(b.name);
    if (cb !== ca) return cb - ca;
    return a.name.localeCompare(b.name);
  });
  const validIds = new Set(people.map(p => p.id));
  peopleSelection = new Set(Array.from(peopleSelection).filter(id => validIds.has(id)));
  const total = people.length;
  const selCount = peopleSelection.size;
  const canStart = selCount >= PEOPLE_MIN && selCount <= PEOPLE_MAX;

  $app().innerHTML = `
    <header class="top">
      <button class="nav-btn" id="back-btn" aria-label="Back to home" title="Back">←</button>
      <span class="brand">PLAYERS</span>
      ${total > 0 ? `<span class="progress mono">${selCount > 0 ? selCount + ' SEL' : total + ' TOTAL'}</span>` : ''}
    </header>

    ${total > 0 ? `
      <section>
        <div class="eyebrow">
          <span class="label">Select to start</span>
          <span class="hr"></span>
          <span class="meta mono">${PEOPLE_MIN}–${PEOPLE_MAX}</span>
        </div>
        <div class="people-grid">
          ${people.map(p => renderPersonCard(p, peopleSelection.has(p.id))).join('')}
        </div>
      </section>

      <div class="people-fab-spacer"></div>
      <div class="people-fab">
        <button class="primary" id="start-with-selected" ${canStart ? '' : 'disabled'}>
          ${selCount === 0 ? 'Tap players to select' : selCount < PEOPLE_MIN ? 'Select at least ' + PEOPLE_MIN : selCount > PEOPLE_MAX ? 'Max ' + PEOPLE_MAX + ' players' : 'Start Tournament (' + selCount + ')'}
        </button>
      </div>
    ` : `
      <section>
        <div class="empty-history">
          <div class="empty-title mono">No players yet</div>
          <div class="empty-body">Players you add during a tournament setup will appear here with their photos. You'll be able to bring them back for future tournaments with one tap.</div>
        </div>
        <button class="primary" id="people-new-btn">+ Start a Tournament</button>
      </section>
    `}
  `;

  bindPeopleEvents();
}

function renderPersonCard(p, selected) {
  const count = countAppearances(p.name);
  return `
    <div class="person-card${selected ? ' selected' : ''}" data-person-id="${p.id}" role="button" tabindex="0">
      <button class="person-delete" data-delete-person="${p.id}" aria-label="Delete ${escapeHtml(p.name)}">×</button>
      ${renderAvatar(p.name, p.photo, 'lg')}
      <div class="pc-name">${escapeHtml(p.name)}</div>
      <div class="pc-count">${count === 0 ? 'New' : count + (count === 1 ? ' tournament' : ' tournaments')}</div>
      ${selected ? '<div class="person-check">✓</div>' : ''}
    </div>
  `;
}

function bindPeopleEvents() {
  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.addEventListener('click', () => {
    state.phase = 'home';
    persist();
    render();
  });

  $app().querySelectorAll('.person-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.person-delete')) return;
      const id = +card.dataset.personId;
      if (peopleSelection.has(id)) peopleSelection.delete(id);
      else if (peopleSelection.size < PEOPLE_MAX) peopleSelection.add(id);
      render();
    });
  });

  $app().querySelectorAll('[data-delete-person]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = +e.currentTarget.dataset.deletePerson;
      showDeletePersonModal(id);
    });
  });

  const startBtn = document.getElementById('start-with-selected');
  if (startBtn) startBtn.addEventListener('click', () => {
    if (startBtn.disabled) return;
    if (state.results.length > 0 && !state.archived) {
      showDiscardModal(() => startTournamentFromSelection());
      return;
    }
    startTournamentFromSelection();
  });

  const newBtn = document.getElementById('people-new-btn');
  if (newBtn) newBtn.addEventListener('click', goToSetup);
}

function startTournamentFromSelection() {
  const ids = Array.from(peopleSelection);
  const names = ids
    .map(id => findPersonById(id))
    .filter(Boolean)
    .map(p => p.name);
  if (names.length < PEOPLE_MIN || names.length > PEOPLE_MAX) return;
  state.players = names;
  state.rounds = state.rounds || 1;
  state.currentGame = 0;
  state.currentScores = [0, 0];
  state.results = [];
  state.archived = false;
  state.phase = 'setup';
  peopleSelection = new Set();
  persist();
  render();
}

          <div class="continue-meta dim">${state.players.length} players · ${formatLabel}</div>
          <button class="primary" id="continue-btn">Continue Tournament</button>
        </div>

    } else {
      resumeCard = `
        <div class="continue-card">
          <div class="np-top">
            <span class="np-label"><span class="star">★</span>Tournament Complete</span>
            <span class="np-game">${total} / ${total}</span>

  $app().innerHTML = `
    <header class="top">
      <span class="brand">SQUASH</span>
      <span class="brand-sub mono">TOURNAMENT</span>
    </header>

    ${resumeCard}

    <button class="primary" id="home-new-btn">+ New Tournament</button>

    <section>
      <div class="eyebrow">
        <span class="label">Players</span>
        <span class="hr"></span>
        ${(state.people && state.people.length > 0) ? `<span class="meta mono">${state.people.length}</span>` : ''}
      </div>
      <button class="players-tile" id="open-people-btn">
        ${(state.people && state.people.length > 0) ? `
          <div class="players-tile-preview">
            ${state.people.slice(0, 6).map(p => `<span class="ptile-avatar">${renderAvatar(p.name, p.photo, 'sm')}</span>`).join('')}
            ${state.people.length > 6 ? `<span class="ptile-more mono">+${state.people.length - 6}</span>` : ''}
          </div>
          <span class="players-tile-cta">View all & pick lineup<span class="chev">›</span></span>
        ` : `
          <span class="players-tile-empty">No saved players yet — add photos during setup<span class="chev">›</span></span>
        `}
      </button>
    </section>

    <section>
      <div class="eyebrow">
        <span class="label">History</span>
        <span class="hr"></span>
        ${hasHistory ? `<span class="meta mono">${state.history.length}</span>` : ''}
      </div>
      ${hasHistory
        ? `<div class="history-list">${state.history.map(renderHistoryCard).join('')}</div>`
        : `<div class="empty-history">
            <div class="empty-title mono">No tournaments yet</div>
            <div class="empty-body">Start your first tournament above. Completed tournaments will appear here automatically.</div>
          </div>`}
    </section>
  `;

  document.getElementById('home-new-btn').addEventListener('click', () => {
    const inProgress = state.results.length > 0 && !state.archived;
    if (inProgress) {
      showDiscardModal();
    } else {
      goToSetup();
    }
  });

  const continueBtn = document.getElementById('continue-btn');
  if (continueBtn) continueBtn.addEventListener('click', () => {
    state.phase = 'tournament';
    persist();
    render();
  });

  $app().querySelectorAll('[data-delete-history]').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = +e.currentTarget.dataset.deleteHistory;
      showDeleteHistoryModal(id);
    });
  });

  const openPeopleBtn = document.getElementById('open-people-btn');
  if (openPeopleBtn) openPeopleBtn.addEventListener('click', goToPeople);
}

function goToSetup() {
  state.phase = 'setup';
  state.currentGame = 0;
  state.currentScores = [0, 0];
  state.results = [];
  state.archived = false;
  persist();
  render();
}

function backToHome() {
  state.phase = 'home';
  state.currentGame = 0;
  state.currentScores = [0, 0];
  state.results = [];
  state.archived = false;
  persist();
  render();
}

// ----- Setup -----
function renderSetup() {
  const n = state.players.length;
  const singleGames = n * (n - 1) / 2;
  const doubleGames = singleGames * 2;
  const longRounds = longRoundsFor(n);
  const longGames = singleGames * longRounds;
  const showLong = longRounds > 2;
  if (state.rounds > 2) {
    const snapped = showLong ? longRounds : 2;
    if (state.rounds !== snapped) {
      state.rounds = snapped;
      persist();
    }
  }
  const canStart = state.players.every(p => p.trim().length > 0);

  $app().innerHTML = `
    <header class="top">
      <button class="nav-btn" id="back-btn" aria-label="Back to home" title="Back">←</button>
      <span class="brand">SQUASH</span>
      <span class="brand-sub mono">TOURNAMENT</span>
    </header>

    <section>
      <div class="eyebrow">
        <span class="label">Players</span>
        <span class="hr"></span>
        <span class="meta mono">${n} / 8</span>
      </div>
      <div class="players-list">
        ${state.players.map((name, i) => {
          const person = findPersonByName(name);
          const photo = person ? person.photo : null;
          const avatarInner = photo
            ? `<img src="${photo}" alt="" />`
            : `<span class="${name.trim() ? 'initials' : 'plus'}">${name.trim() ? escapeHtml(getInitials(name)) : '+'}</span>`;
          return `
            <div class="player-row">
              <label class="avatar" data-avatar-idx="${i}">
                ${avatarInner}
                <input type="file" accept="image/*" data-photo-idx="${i}" />
              </label>
              <span class="tag mono">P${i + 1}</span>
              <input type="text" value="${escapeHtml(name)}" placeholder="Player name"
                data-idx="${i}" autocomplete="off" autocapitalize="words" spellcheck="false" />
              ${n > 3 ? `<button class="remove" data-remove="${i}" aria-label="Remove player ${i + 1}">×</button>` : ''}
            </div>
          `;
        }).join('')}
        ${(state.people && state.people.length > 0) ? `
          <button class="from-people-btn" id="from-people-btn" ${n >= 8 ? 'disabled' : ''}>
            <span>+ From People</span>
            <span class="count mono">${state.people.length}</span>
          </button>
        ` : ''}
        ${n < 8 ? `<button class="add-player" id="add-player">+ Add player</button>` : ''}
      </div>
    </section>

    <section>
      <div class="eyebrow">
        <span class="label">Format</span>
        <span class="hr"></span>
      </div>
      <div class="segmented" role="tablist">
        <button class="seg ${state.rounds === 1 ? 'active' : ''}" data-rounds="1" role="tab" aria-selected="${state.rounds === 1}">
          <span>Single</span><span class="seg-meta mono">${singleGames}G</span>
        </button>
        <button class="seg ${state.rounds === 2 ? 'active' : ''}" data-rounds="2" role="tab" aria-selected="${state.rounds === 2}">
          <span>Double</span><span class="seg-meta mono">${doubleGames}G</span>
        </button>
        ${showLong ? `
        <button class="seg ${state.rounds === longRounds ? 'active' : ''}" data-rounds="${longRounds}" role="tab" aria-selected="${state.rounds === longRounds}">
          <span>Long</span><span class="seg-meta mono">${longGames}G</span>
        </button>
        ` : ''}
      </div>
    </section>

    <button class="primary" id="start-btn" ${canStart ? '' : 'disabled'}>Start Tournament</button>
  `;

  bindSetupEvents();
}

function renderHistoryCard(h) {
  const d = new Date(h.completedAt);
  const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase()
    + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const isTied = h.winners.length > 1;
  const diffStr = (h.winnerStats.diff > 0 ? '+' : '') + h.winnerStats.diff;
  const formatLabel = roundsLabel(h.rounds);
  return `
    <div class="history-card">
      <div class="history-head">
        <span class="history-date">${dateStr}</span>
        <button class="history-delete" data-delete-history="${h.id}" aria-label="Delete tournament">×</button>
      </div>
      <div class="history-winner${isTied ? ' tied' : ''}">
        <span class="star">★</span>
        ${isTied
          ? `<span class="tied-label">Tied</span><span>${h.winners.map(escapeHtml).join(' · ')}</span>`
          : `<span>${escapeHtml(h.winners[0])}</span>`}
      </div>
      <div class="history-stats">${h.winnerStats.points} pts · ${h.winnerStats.wins}–${h.winnerStats.losses} · ${diffStr}</div>
      <div class="history-meta">
        <span class="format-tag">${h.players.length}P · ${formatLabel}</span>
        <span class="sep">|</span>
        <span>${h.players.map(escapeHtml).join(', ')}</span>
      </div>
    </div>
  `;
}

function bindSetupEvents() {
  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.addEventListener('click', () => {
    state.phase = 'home';
    persist();
    render();
  });

  $app().querySelectorAll('input[data-idx]').forEach(input => {
    input.addEventListener('input', e => {
      const idx = +e.target.dataset.idx;
      state.players[idx] = e.target.value;
      persist();
      const btn = document.getElementById('start-btn');
      if (btn) btn.disabled = !state.players.every(p => p.trim());
      updateRowAvatar(idx, e.target.value);
    });
  });

  $app().querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = +e.currentTarget.dataset.remove;
      if (state.players.length <= 3) return;
      state.players = state.players.filter((_, i) => i !== idx);
      persist();
      render();
    });
  });

  const addBtn = document.getElementById('add-player');
  if (addBtn) addBtn.addEventListener('click', () => {
    if (state.players.length >= 8) return;
    state.players.push('');
    persist();
    render();
    const inputs = $app().querySelectorAll('input[data-idx]');
    const last = inputs[inputs.length - 1];
    if (last) last.focus();
  });

  $app().querySelectorAll('[data-rounds]').forEach(btn => {
    btn.addEventListener('click', e => {
      const r = +e.currentTarget.dataset.rounds;
      if (state.rounds === r) return;
      state.rounds = r;
      persist();
      render();
    });
  });

  const startBtn = document.getElementById('start-btn');
  startBtn.addEventListener('click', () => {
    if (!state.players.every(p => p.trim())) return;
    state.phase = 'tournament';
    state.players = state.players.map(p => p.trim());
    state.players.forEach(name => upsertPerson(name));
    state.currentGame = 0;
    state.currentScores = [0, 0];
    state.results = [];
    state.archived = false;
    persist();
    render();
  });

  $app().querySelectorAll('input[type="file"][data-photo-idx]').forEach(input => {
    input.addEventListener('change', async e => {
      const idx = +e.currentTarget.dataset.photoIdx;
      const file = e.currentTarget.files && e.currentTarget.files[0];
      e.currentTarget.value = '';
      if (!file) return;
      const name = (state.players[idx] || '').trim();
      if (!name) {
        const nameInput = $app().querySelector(`input[data-idx="${idx}"]`);
        if (nameInput) nameInput.focus();
        return;
      }
      try {
        const dataUrl = await processImageFile(file);
        upsertPerson(name, dataUrl);
        persist();
        render();
      } catch (err) {
        console.warn('Image upload failed', err);
      }
    });
  });

  const fromPeopleBtn = document.getElementById('from-people-btn');
  if (fromPeopleBtn) fromPeopleBtn.addEventListener('click', showPickPeopleModal);
}

// ----- Tournament -----
function renderTournament() {
  const schedule = generateSchedule(state.players.length, state.rounds);
  const total = schedule.length;
  const cg = state.currentGame;
  const isComplete = cg >= total;
  const standings = computeStandings(state.players, state.results);
  const progressNum = isComplete ? total : cg + 1;

  $app().innerHTML = `
    <header class="top">
      <button class="nav-btn" id="back-btn" aria-label="Back to home" title="Back">←</button>
      <span class="brand">SQUASH</span>
      <span class="progress mono">${progressNum} / ${total}</span>
      <button class="reset-btn" id="reset-btn" aria-label="Reset tournament" title="Reset">↺</button>
    </header>

    ${isComplete ? renderComplete(standings) : renderNowPlaying(schedule, cg)}
    ${!isComplete && cg + 1 < total ? renderUpNext(schedule, cg + 1) : ''}

    <section>
      <div class="eyebrow">
        <span class="label">Standings</span>
        <span class="hr"></span>
      </div>
      ${renderStandings(standings)}
    </section>

    ${state.results.length > 0 ? `
      <section>
        <div class="eyebrow">
          <span class="label">Completed</span>
          <span class="hr"></span>
          <span class="meta mono">${state.results.length}</span>
        </div>
        ${renderCompleted()}
      </section>
    ` : ''}
  `;

  bindTournamentEvents();
}

function renderNowPlaying(schedule, idx) {
  const [a, b] = schedule[idx];
  const [s1, s2] = state.currentScores;
  return `
    <div class="now-playing">
      <div class="np-top">
        <span class="np-label"><span class="dot"></span>Now Playing</span>
        <span class="np-game">GAME ${pad2(idx + 1)}</span>
      </div>
      <div class="players-grid">
        <div class="player-col">
          <div class="pname">${escapeHtml(state.players[a])}</div>
          <div class="pscore tnum">${s1}</div>
          <div class="score-controls">
            <button class="score-btn" data-score="0" data-delta="-1" ${s1 === 0 ? 'disabled' : ''} aria-label="Decrease score">−</button>
            <button class="score-btn" data-score="0" data-delta="1" aria-label="Increase score">+</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="player-col">
          <div class="pname">${escapeHtml(state.players[b])}</div>
          <div class="pscore tnum">${s2}</div>
          <div class="score-controls">
            <button class="score-btn" data-score="1" data-delta="-1" ${s2 === 0 ? 'disabled' : ''} aria-label="Decrease score">−</button>
            <button class="score-btn" data-score="1" data-delta="1" aria-label="Increase score">+</button>
          </div>
        </div>
      </div>
      <button class="primary" id="finish-btn">Finish Match</button>
    </div>
  `;
}

function renderUpNext(schedule, idx) {
  const [a, b] = schedule[idx];
  return `
    <div class="up-next">
      <span class="un-label">Up Next</span>
      <span class="un-names">${escapeHtml(state.players[a])}<span class="vs mono">vs</span>${escapeHtml(state.players[b])}</span>
      <span class="un-game mono">GAME ${pad2(idx + 1)}</span>
    </div>
  `;
}

function renderStandings(standings) {
  const top = standings[0];
  const hasResults = state.results.length > 0;
  const tiedIdxSet = new Set();
  if (hasResults && top) {
    standings.forEach(s => {
      if (s.points === top.points && s.diff === top.diff && s.wins === top.wins) {
        tiedIdxSet.add(s.index);
      }
    });
  }

  return `
    <table class="standings">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Points</th>
          <th>Diff</th>
          <th>W–L</th>
        </tr>
      </thead>
      <tbody>
        ${standings.map((s, i) => {
          const isLeader = tiedIdxSet.has(s.index);
          const diffStr = (s.diff > 0 ? '+' : '') + s.diff;
          const diffCls = s.diff > 0 ? 'win' : (s.diff < 0 ? 'loss' : '');
          return `
            <tr>
              <td class="mono">${i + 1}</td>
              <td><div class="name-cell">${isLeader ? '<span class="ldot"></span>' : ''}<span>${escapeHtml(s.name)}</span></div></td>
              <td class="pts mono tnum ${isLeader ? 'pts-leader' : ''}">${s.points}</td>
              <td class="diff mono tnum ${diffCls}">${diffStr}</td>
              <td class="wl mono tnum">${s.wins}–${s.losses}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function renderCompleted() {
  return `
    <ul class="completed">
      ${state.results.map(r => {
        const p1 = state.players[r.p1];
        const p2 = state.players[r.p2];
        const p1Win = r.s1 > r.s2;
        const p2Win = r.s2 > r.s1;
        return `
          <li class="completed-row">
            <span class="g mono">G${pad2(r.game + 1)}</span>
            <span class="names">
              <span class="${p1Win ? 'winner' : (p2Win ? 'loser' : 'winner')}">${escapeHtml(p1)}</span><span class="vs">vs</span><span class="${p2Win ? 'winner' : (p1Win ? 'loser' : 'winner')}">${escapeHtml(p2)}</span>
            </span>
            <span class="cs mono tnum">${r.s1}—${r.s2}</span>
          </li>
        `;
      }).join('')}
    </ul>
  `;
}

function renderComplete(standings) {
  const top = standings[0];
  const tied = standings.filter(s =>
    s.points === top.points && s.diff === top.diff && s.wins === top.wins
  );
  const isTied = tied.length > 1;
  const diffStr = (top.diff > 0 ? '+' : '') + top.diff;

  return `
    <div class="complete-card">
      <div class="complete-top">
        <span class="star">★</span>
        <span class="complete-label">${isTied ? 'Tied' : 'Tournament Complete'}</span>
      </div>
      ${isTied
        ? `<div class="winner-tied-names">${tied.map(t => escapeHtml(t.name)).join('  ·  ')}</div>`
        : `<div class="winner-name">${escapeHtml(top.name)}</div>`}
      <div class="winner-stats mono">${top.points} points scored · ${top.wins}–${top.losses} record · ${diffStr} differential</div>
      <button class="new-tournament-btn" id="done-btn">Done</button>
    </div>
  `;
}

function bindTournamentEvents() {
  $app().querySelectorAll('.score-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const which = +e.currentTarget.dataset.score;
      const delta = +e.currentTarget.dataset.delta;
      const next = Math.max(0, state.currentScores[which] + delta);
      if (next === state.currentScores[which]) return;
      state.currentScores[which] = next;
      persist();
      render();
    });
  });

  const finishBtn = document.getElementById('finish-btn');
  if (finishBtn) finishBtn.addEventListener('click', finishMatch);

  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) resetBtn.addEventListener('click', showResetModal);

  const doneBtn = document.getElementById('done-btn');
  if (doneBtn) doneBtn.addEventListener('click', backToHome);

  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.addEventListener('click', () => {
    if (state.archived) {
      backToHome();
    } else {
      state.phase = 'home';
      persist();
      render();
    }
  });
}

function finishMatch() {
  const [s1, s2] = state.currentScores;
  if (s1 === 0 && s2 === 0) {
    const btn = document.getElementById('finish-btn');
    if (btn) {
      btn.classList.remove('flash-error');
      void btn.offsetWidth;
      btn.classList.add('flash-error');
      setTimeout(() => btn.classList.remove('flash-error'), 600);
    }
    return;
  }
  const schedule = generateSchedule(state.players.length, state.rounds);
  const [p1, p2] = schedule[state.currentGame];
  state.results.push({ game: state.currentGame, p1, p2, s1, s2 });
  state.currentGame += 1;
  state.currentScores = [0, 0];
  if (state.currentGame >= schedule.length && !state.archived) {
    archiveCurrentTournament();
    state.archived = true;
  }
  persist();
  render();
}

function archiveCurrentTournament() {
  const standings = computeStandings(state.players, state.results);
  if (standings.length === 0) return;
  const top = standings[0];
  const winners = standings
    .filter(s => s.points === top.points && s.diff === top.diff && s.wins === top.wins)
    .map(s => s.name);
  const entry = {
    id: Date.now(),
    completedAt: Date.now(),
    players: state.players.slice(),
    rounds: state.rounds,
    results: state.results.slice(),
    winners,
    winnerStats: {
      points: top.points,
      wins: top.wins,
      losses: top.losses,
      diff: top.diff,
    },
  };
  state.history = [entry, ...(state.history || [])];
}

function deleteHistoryEntry(id) {
  state.history = (state.history || []).filter(h => h.id !== id);
  persist();
  render();
}

// ============================================================
// MODAL
// ============================================================
let modalEscHandler = null;

function closeModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  if (modalEscHandler) {
    document.removeEventListener('keydown', modalEscHandler);
    modalEscHandler = null;
  }
}

function showResetModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 class="modal-title" id="modal-title">Reset tournament?</h2>
        <p class="modal-body">All players, scores, and completed games will be cleared.</p>
        <div class="modal-actions">
          <button class="modal-btn" id="modal-cancel">Cancel</button>
          <button class="modal-btn destructive" id="modal-confirm">Reset</button>
        </div>
      </div>
    </div>
  `;

  modalEscHandler = e => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', modalEscHandler);

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-confirm').addEventListener('click', () => {
    closeModal();
    resetAll();
  });
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
}

function resetAll() {
  const history = state.history || [];
  state = DEFAULT_STATE();
  state.phase = 'home';
  state.history = history;
  persist();
  render();
}

function showDiscardModal(onConfirm) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 class="modal-title" id="modal-title">Discard current tournament?</h2>
        <p class="modal-body">Your in-progress tournament will be lost. This can't be undone.</p>
        <div class="modal-actions">
          <button class="modal-btn" id="modal-cancel">Cancel</button>
          <button class="modal-btn destructive" id="modal-confirm">Discard</button>
        </div>
      </div>
    </div>
  `;

  modalEscHandler = e => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', modalEscHandler);

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-confirm').addEventListener('click', () => {
    closeModal();
    if (typeof onConfirm === 'function') onConfirm();
    else goToSetup();
  });
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
}

function showDeleteHistoryModal(id) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 class="modal-title" id="modal-title">Delete tournament?</h2>
        <p class="modal-body">This past tournament will be permanently removed from your history.</p>
        <div class="modal-actions">
          <button class="modal-btn" id="modal-cancel">Cancel</button>
          <button class="modal-btn destructive" id="modal-confirm">Delete</button>
        </div>
      </div>
    </div>
  `;

  modalEscHandler = e => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', modalEscHandler);

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-confirm').addEventListener('click', () => {
    closeModal();
    deleteHistoryEntry(id);
  });
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
}

function showPickPeopleModal() {
  const root = document.getElementById('modal-root');
  const rosterKeys = new Set(state.players.map(normalizeName).filter(Boolean));
  const slotsLeft = Math.max(0, 8 - state.players.length);
  const people = (state.people || []).slice().sort((a, b) => a.name.localeCompare(b.name));
  const selected = new Set();

  function renderBody() {
    if (people.length === 0) {
      return `<div class="picker-empty">No saved people yet.<br/>Add a photo to a player to save them here.</div>`;
    }
    return people.map(p => {
      const inRoster = rosterKeys.has(normalizeName(p.name));
      const isSelected = selected.has(p.id);
      const disabled = inRoster || (!isSelected && selected.size >= slotsLeft);
      return `
        <div class="picker-row${isSelected ? ' selected' : ''}${disabled && !isSelected ? ' disabled' : ''}" data-pid="${p.id}">
          ${renderAvatar(p.name, p.photo, 'sm')}
          <div class="pr-name">${escapeHtml(p.name)}${inRoster ? ' <span class="dim mono" style="font-size:10px;letter-spacing:0.14em;color:var(--text-mute);margin-left:4px;">IN ROSTER</span>' : ''}</div>
          <div class="pr-check">${isSelected ? '✓' : ''}</div>
        </div>
      `;
    }).join('');
  }

  function renderFootLabel() {
    if (selected.size === 0) return slotsLeft > 0 ? `Tap to select (up to ${slotsLeft})` : 'Roster is full';
    return `Add ${selected.size} to Roster`;
  }

  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="picker-modal" role="dialog" aria-modal="true" aria-labelledby="picker-title">
        <div class="picker-head">
          <h2 class="picker-title" id="picker-title">Pick from People</h2>
          <button class="picker-close" id="picker-close" aria-label="Close">×</button>
        </div>
        <div class="picker-body" id="picker-body">${renderBody()}</div>
        <div class="picker-foot">
          <button class="primary" id="picker-add" ${selected.size === 0 || slotsLeft === 0 ? 'disabled' : ''}>${renderFootLabel()}</button>
        </div>
      </div>
    </div>
  `;

  function refresh() {
    document.getElementById('picker-body').innerHTML = renderBody();
    const addBtn = document.getElementById('picker-add');
    addBtn.disabled = selected.size === 0 || slotsLeft === 0;
    addBtn.textContent = renderFootLabel();
    bindRows();
  }
  function bindRows() {
    document.querySelectorAll('.picker-row').forEach(row => {
      row.addEventListener('click', () => {
        if (row.classList.contains('disabled')) return;
        const id = +row.dataset.pid;
        if (selected.has(id)) selected.delete(id);
        else if (selected.size < slotsLeft) selected.add(id);
        refresh();
      });
    });
  }

  modalEscHandler = e => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', modalEscHandler);

  document.getElementById('picker-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
  bindRows();

  document.getElementById('picker-add').addEventListener('click', () => {
    if (selected.size === 0) return;
    const ids = Array.from(selected);
    const picked = ids.map(id => findPersonById(id)).filter(Boolean);
    let emptyIdxs = state.players
      .map((n, i) => ({ n, i }))
      .filter(x => !x.n.trim())
      .map(x => x.i);
    for (const p of picked) {
      if (emptyIdxs.length > 0) {
        state.players[emptyIdxs.shift()] = p.name;
      } else if (state.players.length < 8) {
        state.players.push(p.name);
      }
    }
    closeModal();
    persist();
    render();
  });
}

function showPersonModal(id) {
  const person = findPersonById(id);
  if (!person) return;
  const appearances = countAppearances(person.name);
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="person-detail">
          ${renderAvatar(person.name, person.photo, 'xl')}
          <div class="pd-name" id="modal-title">${escapeHtml(person.name)}</div>
          <div class="pd-meta">${appearances} ${appearances === 1 ? 'tournament' : 'tournaments'}</div>
          <input type="text" class="rename-input" id="rename-input" value="${escapeHtml(person.name)}" placeholder="Name" />
          <label class="from-people-btn" style="width:100%;">
            <span>Change Photo</span>
            <input type="file" accept="image/*" id="change-photo" style="position:absolute;opacity:0;width:0;height:0;" />
          </label>
        </div>
        <div class="person-detail-actions">
          <button class="modal-btn destructive" id="modal-delete">Delete</button>
          <button class="modal-btn" id="modal-save" style="background:var(--accent);border-color:var(--accent);color:var(--accent-ink);font-weight:600;">Save</button>
        </div>
      </div>
    </div>
  `;

  modalEscHandler = e => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', modalEscHandler);

  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });

  document.getElementById('modal-delete').addEventListener('click', () => {
    closeModal();
    showDeletePersonModal(id);
  });

  document.getElementById('modal-save').addEventListener('click', () => {
    const newName = document.getElementById('rename-input').value.trim();
    if (!newName) return;
    if (normalizeName(newName) !== normalizeName(person.name)) {
      const collision = findPersonByName(newName);
      if (collision && collision.id !== person.id) return;
    }
    person.name = newName;
    closeModal();
    persist();
    render();
  });

  const photoInput = document.getElementById('change-photo');
  photoInput.addEventListener('change', async e => {
    const file = e.currentTarget.files && e.currentTarget.files[0];
    e.currentTarget.value = '';
    if (!file) return;
    try {
      const dataUrl = await processImageFile(file);
      person.photo = dataUrl;
      persist();
      const avatarEl = document.querySelector('.person-detail .avatar.xl');
      if (avatarEl) avatarEl.innerHTML = `<img src="${dataUrl}" alt="" />`;
    } catch (err) {
      console.warn('Image upload failed', err);
    }
  });
}

function showDeletePersonModal(id) {
  const person = findPersonById(id);
  if (!person) return;
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 class="modal-title" id="modal-title">Remove ${escapeHtml(person.name)}?</h2>
        <p class="modal-body">They'll be removed from your saved people. Past tournaments they played in are not affected.</p>
        <div class="modal-actions">
          <button class="modal-btn" id="modal-cancel">Cancel</button>
          <button class="modal-btn destructive" id="modal-confirm">Remove</button>
        </div>
      </div>
    </div>
  `;

  modalEscHandler = e => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', modalEscHandler);

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-confirm').addEventListener('click', () => {
    deletePersonById(id);
    closeModal();
    persist();
    render();
  });
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
}

function backfillPeopleFromHistory() {
  let changed = false;
  for (const h of (state.history || [])) {
    for (const name of (h.players || [])) {
      const trimmed = String(name || '').trim();
      if (trimmed && !findPersonByName(trimmed)) {
        upsertPerson(trimmed);
        changed = true;
      }
    }
  }
  if (changed) persist();
}

// ============================================================
// INIT
// ============================================================
backfillPeopleFromHistory();
render();
_hydrateFromServer();
</script>
